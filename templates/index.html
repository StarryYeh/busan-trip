<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>釜山旅遊 🇰🇷</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
<style>
/* ── RESET & VARS ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --d1:#EA4335;--d2:#00897B;--d3:#1A73E8;--d4:#34A853;--d5:#9C27B0;
  --bg:#F8F9FA;--surface:#FFFFFF;--card:#F1F3F4;--border:#E8EAED;
  --text:#202124;--muted:#5F6368;--green:#34A853;--red:#EA4335;--blue:#1A73E8;
}
html,body{height:100%;height:100dvh;overflow:hidden}
body{font-family:'Roboto','Noto Sans TC',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:15px}

/* ── HEADER ── */
header{height:56px;flex-shrink:0;background:var(--surface);border-bottom:none;box-shadow:0 1px 3px rgba(60,64,67,.15);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100}
.hdr-flag{font-size:22px}
.hdr-info{flex:1}
.hdr-title{font-size:16px;font-weight:500;letter-spacing:.1px}
.hdr-sub{font-size:12px;color:var(--muted)}
.sync-pill{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--muted)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.sync-dot.loading{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hdr-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.hdr-btn:hover{background:var(--card)}

/* ── DAY TABS ── */
.day-tabs{height:56px;flex-shrink:0;display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex:1;min-width:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;padding:4px 6px;gap:1px}
.day-tab .dt-d{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.4px;line-height:1.2}
.day-tab .dt-date{font-size:14px;font-weight:700;line-height:1.2}
.day-tab .dt-theme{font-size:10px;color:var(--muted);line-height:1.2;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-tab[data-d="0"].active{border-bottom-color:var(--d1)}.day-tab[data-d="0"].active .dt-date{color:var(--d1)}
.day-tab[data-d="1"].active{border-bottom-color:var(--d2)}.day-tab[data-d="1"].active .dt-date{color:var(--d2)}
.day-tab[data-d="2"].active{border-bottom-color:var(--d3)}.day-tab[data-d="2"].active .dt-date{color:var(--d3)}
.day-tab[data-d="3"].active{border-bottom-color:var(--d4)}.day-tab[data-d="3"].active .dt-date{color:var(--d4)}
.day-tab[data-d="4"].active{border-bottom-color:var(--d5)}.day-tab[data-d="4"].active .dt-date{color:var(--d5)}

/* ── VIEWS ── */
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;display:none;flex-direction:column}
.view.active{display:flex}

/* ── MAP VIEW ── */
#view-map .map-body{flex:1;display:flex;overflow:hidden;position:relative}
#map{flex:1}

/* Desktop timeline */
.tl-panel{width:290px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tl-scroll{overflow-y:auto;flex:1;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.tl-scroll::-webkit-scrollbar{width:4px}
.tl-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Timeline items */
.tl-item{display:flex;gap:8px;padding:9px;border-radius:8px;cursor:pointer;transition:background .15s;position:relative}
.tl-item:hover,.tl-item.active{background:var(--card)}
.tl-drag{width:14px;cursor:grab;color:var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 2px;transition:color .15s}
.tl-drag:active{cursor:grabbing}
.tl-item:hover .tl-drag{color:var(--muted)}
.tl-item.sortable-ghost{opacity:.35;background:var(--card)!important}
.tl-item.sortable-chosen{box-shadow:0 1px 3px rgba(60,64,67,.2)}
.tl-acts{display:flex;gap:4px;margin-top:6px}
.tl-act{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.tl-act:hover{border-color:var(--blue);color:var(--blue);background:#1A73E811}
.tl-act.del:hover{border-color:var(--red);color:var(--red);background:#EA433511}

/* Files view */
.file-grid{display:flex;flex-direction:column;gap:8px}
.file-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 14px;box-shadow:0 1px 2px rgba(60,64,67,.08)}
.file-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center}
.file-body{flex:1;min-width:0}
.file-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:12px;color:var(--muted);margin-top:2px}
.file-cat{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;margin-top:4px;background:var(--card);color:var(--muted)}
.file-actions{display:flex;gap:6px;flex-shrink:0}
.file-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s;text-decoration:none}
.file-btn:hover{background:var(--card);color:var(--text)}
.file-btn.del:hover{background:#EA433511;color:var(--red)}
.upload-drop{border:2px dashed var(--border);border-radius:8px;padding:30px 16px;text-align:center;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-drop:hover,.upload-drop.dragover{border-color:var(--blue);color:var(--blue);background:#1A73E808}
.upload-drop-icon{font-size:32px;margin-bottom:8px}
.upload-drop-txt{font-size:14px;font-weight:500}
.upload-drop-sub{font-size:12px;margin-top:4px}

/* ── SHOP VIEW ── */
.shop-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 13px;margin-bottom:8px;transition:opacity .2s;box-shadow:0 1px 2px rgba(60,64,67,.08)}
.shop-item.bought{opacity:.45}
.shop-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.shop-check.on{background:var(--green);border-color:var(--green)}
.shop-thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1px solid var(--border)}
.shop-thumb-ph{width:52px;height:52px;border-radius:8px;flex-shrink:0;background:var(--card);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--border);font-size:20px;transition:all .2s}
.shop-thumb-ph:hover{border-color:var(--blue);color:var(--blue)}
.shop-body{flex:1;min-width:0}
.shop-name{font-size:15px;font-weight:500;line-height:1.3}
.shop-item.bought .shop-name{text-decoration:line-through;color:var(--muted)}
.shop-note{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.4}
.shop-price{display:inline-block;font-size:12px;font-weight:500;color:var(--blue);background:#1A73E811;border-radius:4px;padding:1px 8px;margin-top:4px}
.shop-del{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.shop-del:hover{background:#EA433511;color:var(--red)}
.shop-stat{font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:400}
.shop-stat b{color:var(--green)}

/* ── TODO VIEW ── */
.todo-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 14px;margin-bottom:8px;transition:opacity .2s;box-shadow:0 1px 2px rgba(60,64,67,.08)}
.todo-item.done{opacity:.45}
.todo-check{width:22px;height:22px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.todo-check.on{background:var(--green);border-color:var(--green)}
.todo-body{flex:1;min-width:0}
.todo-task{font-size:15px;font-weight:400;line-height:1.4}
.todo-item.done .todo-task{text-decoration:line-through;color:var(--muted)}
.todo-owner{display:inline-block;font-size:11px;font-weight:500;padding:1px 8px;border-radius:4px;margin-top:4px;background:#1A73E811;color:var(--blue)}
.todo-del{width:30px;height:30px;border-radius:50%;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.todo-del:hover{background:#EA433511;color:var(--red)}
.todo-section-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.todo-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.todo-stat{font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:400}
.todo-stat b{color:var(--green)}

/* Expense onboarding */
.onboard-wrap{padding:20px 16px}
.onboard-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px 20px;box-shadow:0 1px 3px rgba(60,64,67,.12)}
.onboard-hero{text-align:center;margin-bottom:20px}
.onboard-hero-icon{font-size:44px;margin-bottom:10px}
.onboard-hero-title{font-size:20px;font-weight:500;color:var(--text)}
.onboard-hero-sub{font-size:14px;color:var(--muted);margin-top:6px;line-height:1.6}
.onboard-steps{display:flex;flex-direction:column;gap:14px;margin-bottom:22px}
.onboard-step{display:flex;align-items:flex-start;gap:12px}
.ob-num{width:28px;height:28px;border-radius:50%;color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ob-title{font-size:15px;font-weight:500;color:var(--text)}
.ob-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5}
.tl-line{display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0}
.tl-dot{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid;flex-shrink:0;background:#fff;box-shadow:0 1px 3px rgba(60,64,67,.18),0 2px 6px rgba(60,64,67,.1);transition:transform .2s,box-shadow .2s}
.tl-dot svg{display:block;flex-shrink:0}
.tl-item.active .tl-dot{transform:scale(1.08);box-shadow:0 2px 8px rgba(60,64,67,.22),0 4px 12px rgba(60,64,67,.12)}
.tl-conn{width:2px;flex:1;min-height:8px;margin:3px 0;opacity:.2}
.tl-body{flex:1;padding-top:2px;min-width:0}
.tl-time{font-size:11px;color:var(--muted);font-weight:500}
.tl-name{font-size:14px;font-weight:500;line-height:1.3}
.tl-note{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.tl-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.tl-tag{font-size:11px;padding:1px 7px;border-radius:4px}

/* Mobile drawer */
.tl-drawer{position:absolute;inset:auto 0 0 0;z-index:200;height:52%;background:var(--surface);border-top:1px solid var(--border);border-radius:12px 12px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.tl-drawer.open{transform:translateY(0)}
.tl-handle{height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.tl-handle::after{content:'';width:36px;height:4px;background:var(--border);border-radius:2px}

/* Map FABs */
.map-fabs{position:absolute;bottom:16px;right:16px;z-index:100;display:flex;flex-direction:column;gap:8px}
.map-fab{width:46px;height:46px;border-radius:50%;border:none;background:var(--surface);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px rgba(60,64,67,.15);transition:box-shadow .2s}
.map-fab:hover{box-shadow:0 2px 6px rgba(60,64,67,.3),0 6px 12px rgba(60,64,67,.2)}

/* ── EXPENSE VIEW ── */
#view-expense{overflow-y:auto}
.exp-section{padding:16px 16px 0}
.exp-title{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.exp-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Balance cards */
.bal-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.bal-row::-webkit-scrollbar{display:none}
.bal-card{min-width:110px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;flex-shrink:0;box-shadow:0 1px 2px rgba(60,64,67,.08)}
.bc-name{font-size:13px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-paid{font-size:11px;color:var(--muted);margin-top:1px}
.bc-net{font-size:20px;font-weight:700;margin-top:5px;line-height:1}
.bc-net.pos{color:var(--green)}.bc-net.neg{color:var(--red)}.bc-net.zero{color:var(--muted)}
.bc-lbl{font-size:11px;margin-top:2px;color:var(--muted)}

/* Settlement */
.settle-empty{text-align:center;padding:14px;color:var(--muted);font-size:14px}
.settle-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(60,64,67,.08)}
.si-from{font-weight:500;font-size:15px;white-space:nowrap}
.si-arrow{color:var(--muted);font-size:20px}
.si-to{font-weight:500;font-size:15px;white-space:nowrap}
.si-amt{margin-left:auto;font-size:17px;font-weight:700;color:var(--red);white-space:nowrap}

/* Expense list */
.exp-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(60,64,67,.08)}
.ei-icon{font-size:22px;flex-shrink:0}
.ei-body{flex:1;min-width:0}
.ei-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ei-meta{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-right{text-align:right;flex-shrink:0}
.ei-amt{font-size:16px;font-weight:700}
.ei-twd{font-size:11px;color:var(--muted)}
.ei-del{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ei-del:hover{background:#EA433511;color:var(--red)}
.day-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap}
.exp-spacer{height:80px}

/* ── BOTTOM TAB BAR ── */
.bottom-tabs{height:60px;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.3px;transition:color .2s;padding:8px}
.btab-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;transition:color .2s}.btab-icon svg{width:24px;height:24px}
.btab.active{color:var(--blue)}
.btab.active .btab-icon{color:var(--blue)}

/* ── FAB ── */
.fab{position:fixed;bottom:76px;right:18px;z-index:450;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;background:var(--blue);color:#fff;font-size:28px;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px rgba(60,64,67,.2);transition:box-shadow .2s,opacity .2s,transform .2s}
.fab:hover{box-shadow:0 2px 6px rgba(60,64,67,.3),0 6px 16px rgba(60,64,67,.25);transform:scale(1.04)}
.fab.hidden{opacity:0;pointer-events:none;transform:scale(.8)}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:500px;background:var(--surface);border-radius:16px 16px 0 0;border:none;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -2px 8px rgba(60,64,67,.15)}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.sheet-handle::after{content:'';width:36px;height:4px;background:var(--border);border-radius:2px}
.sheet-head{padding:4px 16px 14px;display:flex;align-items:center}
.sheet-title{font-size:18px;font-weight:500;flex:1}
.sheet-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--card);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.sheet-close:hover{background:var(--border)}
.sheet-body{padding:0 16px 36px}

/* Form */
.fg{margin-bottom:14px}
.flabel{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.2px;margin-bottom:5px;display:block}
.finput{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:12px 12px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.finput:focus{border-color:var(--blue);border-width:2px}
.frow{display:flex;gap:8px}
.frow .fg{flex:1}
.time-picker-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.time-select{text-align:center}
.curr-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.curr-btn{flex:1;padding:11px 8px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
.curr-btn.active{background:var(--blue);color:#fff}
.chip-row{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;font-weight:400;transition:all .2s;user-select:none}
.chip.on{background:#1A73E822;border-color:var(--blue);color:var(--blue)}
.sbtn{width:100%;padding:14px;border-radius:4px;border:none;cursor:pointer;background:var(--blue);color:#fff;font-size:15px;font-weight:500;margin-top:8px;transition:background .2s,box-shadow .2s;box-shadow:0 1px 3px rgba(26,115,232,.4)}
.sbtn:hover{background:#1557B0;box-shadow:0 2px 6px rgba(26,115,232,.4)}
.sbtn:disabled{opacity:.6;cursor:not-allowed}

/* Settings */
.mlist{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.mitem{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:10px 12px}
.mname{flex:1;font-size:15px;font-weight:400}
.mdel{border:none;background:none;color:var(--muted);cursor:pointer;font-size:17px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
.mdel:hover{background:#EA433511;color:var(--red)}
.madd-row{display:flex;gap:8px}
.madd-btn{padding:11px 14px;border-radius:4px;border:1px solid var(--blue);background:transparent;color:var(--blue);cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;transition:background .2s}
.madd-btn:hover{background:#1A73E811}

/* Empty */
.empty{text-align:center;padding:40px 24px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-txt{font-size:14px;line-height:1.6}

/* Leaflet popup */
.leaflet-popup-content-wrapper{background:#FFFFFF;color:var(--text);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 3px rgba(60,64,67,.3),0 4px 8px rgba(60,64,67,.15)}
.leaflet-popup-tip{background:#FFFFFF}
.lp{min-width:160px}.lp .pe{display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.lp .pn{font-size:14px;font-weight:500}.lp .pt{font-size:12px;color:var(--muted);margin-top:2px}
.lp .pd{font-size:12px;margin-top:5px;line-height:1.45;color:var(--muted)}
.map-link-row{display:flex;gap:6px;margin-top:10px}.map-link-btn{flex:1;text-align:center;text-decoration:none;font-size:13px;font-weight:500;padding:8px;border-radius:4px;background:#fff;color:var(--blue);border:1.5px solid var(--blue)}.map-link-btn:hover{background:var(--blue);color:#fff}


/* Desktop */
@media(min-width:768px){
  .tl-panel{display:flex!important;order:-1}
  .tl-drawer,.map-fabs{display:none!important}
}
@media(max-width:767px){
  #view-map .map-body{flex-direction:column}
  #map{height:45%;flex:none}
  .tl-panel{display:flex!important;width:100%!important;min-width:unset;height:55%;border-right:none;border-top:1px solid var(--border);order:1}
  .tl-drawer,.map-fabs{display:none!important}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span class="hdr-flag">🇰🇷</span>
  <div class="hdr-info">
    <div class="hdr-title">釜山旅遊行程</div>
    <div class="hdr-sub">2026 · 6/5–6/9 · 5天4夜</div>
  </div>
  <div class="sync-pill">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncTxt">已同步</span>
  </div>
  <button class="hdr-btn" onclick="openSettings()" title="設定"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</header>

<!-- DAY TABS -->
<div class="day-tabs" id="dayTabs"></div>

<!-- VIEWS -->
<div class="views">

  <!-- MAP VIEW -->
  <div id="view-map" class="view active">
    <div class="map-body">
      <div class="tl-panel"><div class="tl-scroll" id="tlDesk"></div></div>
      <div id="map"></div>
      <div class="tl-drawer" id="tlDrawer">
        <div class="tl-handle" onclick="toggleDrawer()"></div>
        <div class="tl-scroll" id="tlMob" style="flex:1;overflow-y:auto"></div>
      </div>
    </div>
    <div class="map-fabs">
      <div class="map-fab" onclick="toggleDrawer()"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg></div>
    </div>
  </div>

  <!-- EXPENSE VIEW -->
  <div id="view-expense" class="view" style="overflow-y:auto">
    <div id="secOnboard"></div>
    <div class="exp-section" id="secBalances"></div>
    <div class="exp-section" id="secSettle"></div>
    <div class="exp-section" id="secList"></div>
    <div class="exp-spacer"></div>
  </div>

  <!-- FILES VIEW -->
  <div id="view-files" class="view" style="overflow-y:auto">
    <div class="exp-section">
      <div class="exp-title">旅遊文件</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px">機票、訂房確認、景點票券等重要文件</div>
      <div class="file-grid" id="fileGrid"></div>
    </div>
    <div class="exp-spacer"></div>
  </div>

  <!-- TODO VIEW -->
  <div id="view-todo" class="view" style="overflow-y:auto">
    <div class="exp-section">
      <div class="exp-title">行前待辦</div>
      <div class="todo-stat" id="todoStat"></div>
      <div id="todoList"></div>
    </div>
    <div class="exp-spacer"></div>
  </div>

  <!-- SHOP VIEW -->
  <div id="view-shop" class="view" style="overflow-y:auto">
    <div class="exp-section">
      <div class="exp-title">待買清單</div>
      <div class="shop-stat" id="shopStat"></div>
      <div id="shopList"></div>
    </div>
    <div class="exp-spacer"></div>
  </div>

</div>

<!-- BOTTOM TABS -->
<div class="bottom-tabs">
  <button class="btab active" id="btab-map" onclick="switchTab('map')">
    <span class="btab-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 3L3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"/><path d="M9 3v15M15 6v15"/></svg></span><span>行程地圖</span>
  </button>
  <button class="btab" id="btab-expense" onclick="switchTab('expense')">
    <span class="btab-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/><circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/></svg></span><span>分帳記帳</span>
  </button>
  <button class="btab" id="btab-files" onclick="switchTab('files')">
    <span class="btab-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg></span><span>票券文件</span>
  </button>
  <button class="btab" id="btab-shop" onclick="switchTab('shop')">
    <span class="btab-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span><span>待買清單</span>
  </button>
  <button class="btab" id="btab-todo" onclick="switchTab('todo')">
    <span class="btab-icon"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="5" width="6" height="6" rx="1"/><polyline points="3 17 5 19 9 15"/><line x1="13" y1="8" x2="21" y2="8"/><line x1="13" y1="18" x2="21" y2="18"/></svg></span><span>待辦清單</span>
  </button>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="handleFabClick()" title="新增景點">＋</button>

<!-- ── MODAL: ADD SPOT ── -->
<div class="overlay" id="ovSpot" onclick="overlayClick(event,'ovSpot')">
  <div class="sheet">
    <div class="sheet-handle" onclick="closeModal('ovSpot')"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="spotModalTitle">新增景點</div>
      <button class="sheet-close" onclick="closeModal('ovSpot')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="frow">
        <div class="fg">
          <label class="flabel">Day</label>
          <select class="finput" id="sDay">
            <option value="1">Day 1 · 海雲台</option>
            <option value="2">Day 2 · 廣安里</option>
            <option value="3">Day 3 · 影島松島</option>
            <option value="4">Day 4 · 購物日</option>
            <option value="5">Day 5 · 返程</option>
          </select>
        </div>
        <div class="fg">
          <label class="flabel">時間</label>
          <div class="time-picker-row">
            <select class="finput time-select" id="sAmpm">
              <option value="上午">上午</option>
              <option value="下午">下午</option>
            </select>
            <select class="finput time-select" id="sHour">
              <option>6</option><option>7</option><option>8</option><option>9</option>
              <option>10</option><option>11</option><option>12</option>
              <option>1</option><option>2</option><option>3</option>
              <option>4</option><option>5</option>
            </select>
            <select class="finput time-select" id="sMinute">
              <option>00</option><option>10</option><option>20</option>
              <option>30</option><option>40</option><option>50</option>
            </select>
          </div>
        </div>
      </div>
      <div class="frow">
        <div class="fg" style="flex:3"><label class="flabel">景點名稱</label><input class="finput" id="sName" placeholder="例：Liberta cafe" type="text"></div>
        <div class="fg" style="flex:1"><label class="flabel">圖示</label><input class="finput" id="sEmoji" placeholder="☕" type="text" style="text-align:center;font-size:20px"></div>
      </div>
      <div class="fg"><label class="flabel">Naver Map URL</label><input class="finput" id="sGoogleUrl" placeholder="貼上 Naver Map 分享連結" type="url"></div>
      <div class="fg"><label class="flabel">備註</label><textarea class="finput" id="sDesc" placeholder="例：營業時間、訂位資訊、票券備註" rows="3"></textarea></div>
      <div class="fg"><label class="flabel">標籤</label><input class="finput" id="sTags" placeholder="例：美食,打卡,必去" type="text"><div style="font-size:11px;color:var(--muted);margin-top:4px">用逗號分隔，例如：美食,打卡</div></div>
      <button class="sbtn" id="addSpotBtn" onclick="submitSpot()">新增景點</button>
    </div>
  </div>
</div>

<!-- ── MODAL: ADD EXPENSE ── -->
<div class="overlay" id="ovExp" onclick="overlayClick(event,'ovExp')">
  <div class="sheet">
    <div class="sheet-handle" onclick="closeModal('ovExp')"></div>
    <div class="sheet-head">
      <div class="sheet-title">新增消費</div>
      <button class="sheet-close" onclick="closeModal('ovExp')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <label class="flabel">消費名稱</label>
        <input class="finput" id="eName" placeholder="例：午餐、纜車票、藥妝…" type="text">
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">金額</label>
          <input class="finput" id="eAmt" placeholder="0" type="number" inputmode="decimal">
        </div>
        <div class="fg">
          <label class="flabel">幣別</label>
          <div class="curr-toggle">
            <button class="curr-btn active" id="cKRW" onclick="setCurr('KRW')">₩ KRW</button>
            <button class="curr-btn" id="cTWD" onclick="setCurr('TWD')">NT$ TWD</button>
          </div>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">付款人</label>
        <select class="finput" id="ePayer"></select>
      </div>
      <div class="fg">
        <label class="flabel">分攤對象 <span id="splitPreview" style="color:var(--green);font-weight:600;text-transform:none;letter-spacing:0"></span></label>
        <div class="chip-row" id="chipRow"></div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">第幾天</label>
          <select class="finput" id="eDay">
            <option value="0">不指定</option>
            <option value="1">Day 1 · 海雲台</option>
            <option value="2">Day 2 · 廣安里</option>
            <option value="3">Day 3 · 影島松島</option>
            <option value="4">Day 4 · 購物日</option>
            <option value="5">Day 5 · 返程</option>
          </select>
        </div>
        <div class="fg">
          <label class="flabel">備註</label>
          <input class="finput" id="eNote" placeholder="選填" type="text">
        </div>
      </div>
      <button class="sbtn" id="addBtn" onclick="submitExpense()">✅ 新增消費</button>
    </div>
  </div>
</div>

<!-- ── MODAL: SETTINGS ── -->
<div class="overlay" id="ovSet" onclick="overlayClick(event,'ovSet')">
  <div class="sheet">
    <div class="sheet-handle" onclick="closeModal('ovSet')"></div>
    <div class="sheet-head">
      <div class="sheet-title">設定</div>
      <button class="sheet-close" onclick="closeModal('ovSet')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <label class="flabel">我是</label>
        <select class="finput" id="myNameSel" onchange="S.myName=this.value;localStorage.setItem('bsMyName',this.value)"></select>
      </div>
      <div class="fg">
        <label class="flabel">旅遊成員</label>
        <div class="mlist" id="mlist"></div>
        <div class="madd-row">
          <input class="finput" id="newMember" placeholder="輸入成員名稱" type="text" onkeydown="if(event.key==='Enter')addMember()">
          <button class="madd-btn" onclick="addMember()">＋ 新增</button>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">匯率（1 KRW = ? TWD）</label>
        <input class="finput" id="krwRateInput" type="number" step="0.001" placeholder="0.023">
        <div style="font-size:11px;color:var(--muted);margin-top:4px">2026年約 0.023（₩10,000 ≈ NT$230）</div>
      </div>
      <button class="sbtn" id="saveSetBtn" onclick="saveSettings()">💾 儲存設定</button>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">⚠️ 危險操作</div>
        <button class="sbtn" id="reseedBtn" onclick="reseedSpots()" style="background:var(--red);box-shadow:0 1px 3px rgba(234,67,53,.4)">🔄 重置為基礎行程</button>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5">將清空所有景點，重新載入 app 內建的預設行程。自己新增的景點會消失。</div>
      </div>
    </div>
  </div>
</div>

<!-- ── MODAL: UPLOAD FILE ── -->
<div class="overlay" id="ovFile" onclick="overlayClick(event,'ovFile')">
  <div class="sheet">
    <div class="sheet-handle" onclick="closeModal('ovFile')"></div>
    <div class="sheet-head">
      <div class="sheet-title">上傳文件</div>
      <button class="sheet-close" onclick="closeModal('ovFile')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="frow">
        <div class="fg" style="flex:2">
          <label class="flabel">文件名稱（選填）</label>
          <input class="finput" id="fName" placeholder="例：去程機票、城市飯店訂房" type="text">
        </div>
        <div class="fg">
          <label class="flabel">文件類型</label>
          <select class="finput" id="fCat">
            <option value="flight">✈️ 機票</option>
            <option value="hotel">🏨 訂房確認</option>
            <option value="ticket">🎟️ 景點票券</option>
            <option value="transport">🚌 交通票券</option>
            <option value="other">📎 其他</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">連結景點（選填）</label>
        <div style="display:flex;gap:8px">
          <select class="finput" id="fSpotDay" style="flex:1" onchange="onSpotDayChange()">
            <option value="">— 選擇天數 —</option>
          </select>
          <select class="finput" id="fSpotSpot" style="flex:2" disabled>
            <option value="0">（不連結景點）</option>
          </select>
        </div>
      </div>
      <div class="upload-drop" id="uploadDrop" onclick="document.getElementById('fileInput').click()">
        <div class="upload-drop-icon">📁</div>
        <div class="upload-drop-txt">點此選擇檔案</div>
        <div class="upload-drop-sub">支援 PDF、JPG、PNG，最大 12 MB</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.heic,.heif" style="display:none" onchange="handleFileSelect(this)">
      <div id="uploadStatus" style="font-size:13px;color:var(--muted);text-align:center;min-height:20px"></div>
    </div>
  </div>
</div>

<!-- ── MODAL: ADD SHOP ITEM ── -->
<div class="overlay" id="ovShop" onclick="overlayClick(event,'ovShop')">
  <div class="sheet">
    <div class="sheet-handle" onclick="closeModal('ovShop')"></div>
    <div class="sheet-head">
      <div class="sheet-title">新增待買項目</div>
      <button class="sheet-close" onclick="closeModal('ovShop')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="frow">
        <div class="fg" style="flex:2">
          <label class="flabel">品項名稱</label>
          <input class="finput" id="shName" placeholder="例：韓系連身裙、歐巴歐尼泡麵" type="text">
        </div>
        <div class="fg">
          <label class="flabel">誰要買</label>
          <select class="finput" id="shOwner">
            <option value="">大家</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">備註（選填）</label>
        <input class="finput" id="shNote" placeholder="例：廣安里 V Vanilla 附近、GS25 超市" type="text">
      </div>
      <div class="fg">
        <label class="flabel">預算 / 價格（選填）</label>
        <input class="finput" id="shPrice" placeholder="例：약 ₩50,000" type="text">
      </div>
      <div class="fg">
        <label class="flabel">參考照片（選填）</label>
        <div id="shPhotoArea" onclick="document.getElementById('shPhotoInput').click()"
          style="border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;overflow:hidden">
          <div id="shPhotoPreview" style="display:none">
            <img id="shPhotoImg" style="max-height:160px;border-radius:8px;object-fit:contain">
            <div style="font-size:11px;color:var(--muted);margin-top:6px">點此更換照片</div>
          </div>
          <div id="shPhotoPlaceholder">
            <svg width="28" height="28" fill="none" stroke="var(--border)" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:6px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <div style="font-size:13px;color:var(--muted);font-weight:600">點此上傳參考照片</div>
            <div style="font-size:11px;color:var(--border);margin-top:3px">JPG、PNG，最大 12 MB</div>
          </div>
        </div>
        <input type="file" id="shPhotoInput" accept="image/*" style="display:none" onchange="previewShopPhoto(this)">
      </div>
      <button class="sbtn" onclick="addShopItem()">新增</button>
    </div>
  </div>
</div>

<!-- ── MODAL: ADD TODO ── -->
<div class="overlay" id="ovTodo" onclick="overlayClick(event,'ovTodo')">
  <div class="sheet">
    <div class="sheet-handle" onclick="closeModal('ovTodo')"></div>
    <div class="sheet-head">
      <div class="sheet-title">新增待辦事項</div>
      <button class="sheet-close" onclick="closeModal('ovTodo')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <label class="flabel">待辦事項</label>
        <input class="finput" id="tdTask" placeholder="例：訂膠囊列車票、買韓國 SIM 卡" type="text">
      </div>
      <div class="fg">
        <label class="flabel">誰要辦</label>
        <select class="finput" id="tdOwner">
          <option value="">大家</option>
        </select>
      </div>
      <button class="sbtn" onclick="addTodoItem()">新增</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  ITINERARY DATA
// ═══════════════════════════════════════════
const DAYS=[

function getSpotIconType(spot){
  const e=spot.emoji||'';
  const t=spot.tags||[];
  if(['✈️','🛬','🛫'].includes(e)) return 'plane';
  if(['🚌','🚐','🚎'].includes(e)) return 'car';
  if(['🚃','🚂','🚄','🚅','🚡','🚠','🚟'].includes(e)) return 'train';
  if(['🚕','🚗','🚙'].includes(e)) return 'car';
  if(['🏨','🏩','🏰','🏯','🧳','🌙'].includes(e)) return 'hotel';
  if(['☕','🧋','🍵'].includes(e)) return 'coffee';
  if(['🍳','🍱','🦀','🥞','🍲','🥩','🍗','🦑','🐟','🍜','🍛','🥘','🍽️'].includes(e)) return 'food';
  if(['🛍️','👗','🧥','🎀','🛒','💄','🏬'].includes(e)) return 'shopping';
  if(['♨️','🛷','🎡','🎢','🎟️'].includes(e)) return 'activity';
  if(['🎨','🖼️','📸'].includes(e)) return 'camera';
  if(['🏖️','🏝️','🌉','🏘️','🌆','🌇','🏛️'].includes(e)) return 'pin';
  if(t.includes('交通')) return 'plane';
  if(t.includes('住宿')) return 'hotel';
  if(t.includes('美食')) return 'food';
  if(t.includes('咖啡')) return 'coffee';
  if(t.includes('購物')) return 'shopping';
  if(t.includes('體驗')) return 'activity';
  return 'pin';
}
// PNG icon tag for timeline (natural color, fixed)
function getSpotIconImg(spot,size=24){
  const type=getSpotIconType(spot);
  return `<img src="/static/icons/${type}.png" width="${size}" height="${size}" style="object-fit:contain;display:block">`;

function timeToMinutes(t){
  if(!t) return 9999;
  const m = t.match(/(\d{1,2}):(\d{2})/);
  if(m){
    let h = parseInt(m[1]), min = parseInt(m[2]);
    if(t.includes('下午') && h < 12) h += 12;
    if(t.includes('上午') && h === 12) h = 0;
    return h * 60 + min;
  }
  if(/晚上|晚餐/.test(t)) return 1140;
  if(/下午|咖啡備案/.test(t)) return 840;
  if(/午餐|brunch/.test(t)) return 720;
  if(/早午餐|早餐/.test(t)) return 600;
  if(/逛街/.test(t)) return 780;
  if(/回程|移動/.test(t)) return 960;
  if(/預備/.test(t)) return 9990;
  return 9998;
}
function parseTimeStr(t){
  if(!t) return {ampm:'上午',hour:9,min:'00'};
  const m = t.match(/(\d{1,2}):(\d{2})/);
  if(m){
    let h = parseInt(m[1]);
    const min = String(Math.floor(parseInt(m[2])/10)*10).padStart(2,'0');
    const ampm = h >= 12 ? '下午' : '上午';
    if(h > 12) h -= 12;
    if(h === 0) h = 12;
    return {ampm, hour: h, min};
  }
  if(/晚/.test(t)) return {ampm:'下午', hour:7, min:'00'};
  if(/下午/.test(t)) return {ampm:'下午', hour:2, min:'00'};
  if(/午餐/.test(t)) return {ampm:'下午', hour:12, min:'00'};
  if(/早/.test(t)) return {ampm:'上午', hour:8, min:'00'};
  return {ampm:'上午', hour:9, min:'00'};
}
function setAllSpots(dbSpots){
  DAYS.forEach(day=>{ day.spots = []; });
  dbSpots.forEach(sp=>{
    const di = Number(sp.day_num||1) - 1;
    if(!DAYS[di]) return;
    DAYS[di].spots.push({
      id: sp.id, fromDb: true,
      time: sp.time||'', name: sp.name||'未命名',
      mapName: sp.map_name||sp.name||'',
      googleMapUrl: sp.google_map_url||'',
      emoji: sp.emoji||'📍',
      lat: sp.lat ? Number(sp.lat) : null,
      lng: sp.lng ? Number(sp.lng) : null,
      desc: sp.description||'',
      tags: Array.isArray(sp.tags) ? sp.tags : [],
      order_idx: sp.order_idx ?? 999,
    });
  });
  // 依時間自動排序（order_idx 相同時以時間為準）
  DAYS.forEach(day=>{
    day.spots.sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));
  });

}

function initMap(){

function mkIcon(color,spot,active=false){
  const s=active?44:36;
  const sz=active?18:14;
  const img=getSpotIconImgWhite(spot,sz);
  return L.divIcon({
    html:`<div style="width:${s}px;height:${s}px;background:${color};border:${active?3:2.5}px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px ${active?14:7}px ${color}99">${img}</div>`,
    className:'',iconSize:[s,s],iconAnchor:[s/2,s/2]
  });
}
function mapLinks(sp){
  const placeName = sp.mapName || sp.name || '';
  const googleQuery = encodeURIComponent(`${placeName} Busan South Korea`);
  return { google: sp.googleMapUrl || `https://www.google.com/maps/search/?api=1&query=${googleQuery}` };
}

function renderDay(i){
  S.day=i; S.spot=null;
  markers.forEach(m=>map.removeLayer(m)); markers=[]; markerBySpotIndex={};
  polys.forEach(p=>map.removeLayer(p)); polys=[];
  const day=DAYS[i], bounds=[];
  day.spots.forEach((sp,si)=>{
    if(!(sp.lat && sp.lng)) return;
    const m=L.marker([sp.lat,sp.lng],{icon:mkIcon(day.color,sp)}).addTo(map);
    markerBySpotIndex[si] = m;
    const links = mapLinks(sp);
    const linkedFiles = (S.filesBySpotId[sp.id]||[]);
    const fileBtns = linkedFiles.map(f=>
      `<a class="map-link-btn" href="/uploads/${f.filename}" target="_blank" rel="noopener"
         style="background:#F0F4FF;color:#4285F4;border:1.5px solid #4285F4AA">
         📄 ${f.original_name}
       </a>`
    ).join('');
    m.bindPopup(`
      <div class="lp">
        <div class="pe">${getSpotIconImg(sp,31)}</div>
        <div class="pn">${sp.name}</div>
        <div class="pt">${sp.time}</div>
        ${sp.desc?`<div class="pd">${sp.desc}</div>`:''}
        <div class="map-link-row"><a class="map-link-btn" href="${links.google}" target="_blank" rel="noopener">Naver Map</a></div>
        ${fileBtns?`<div class="map-link-row" style="flex-direction:column;gap:4px">${fileBtns}</div>`:''}
      </div>
    `,{maxWidth:260});
    m.on('click',()=>setSpot(i,si));
    markers.push(m); bounds.push([sp.lat,sp.lng]);
  });
  const valid=day.spots.filter(s=>s.lat && s.lng);
  if(valid.length>1){
    const poly=L.polyline(valid.map(s=>[s.lat,s.lng]),{color:day.color,weight:2.5,opacity:.5,dashArray:'6,8'}).addTo(map);
    polys.push(poly);
  }
  if(bounds.length) map.fitBounds(bounds,{padding:[40,40]});
  renderDayTabs(); renderTimeline(-1);
}
function setSpot(di,si){
  S.day=di; S.spot=si;
  const day=DAYS[di];
  const sp=day.spots[si];
  Object.entries(markerBySpotIndex).forEach(([idx,m])=>{
    const sourceSpot=day.spots[Number(idx)];
    if(sourceSpot) m.setIcon(mkIcon(day.color,sourceSpot,Number(idx)===si));
  });
  if(sp.lat && sp.lng && markerBySpotIndex[si]){
    map.flyTo([sp.lat,sp.lng],17,{animate:true,duration:.7});
    setTimeout(()=>markerBySpotIndex[si]?.openPopup(),450);
  }else if(sp.googleMapUrl){
    const openMap=confirm('這個景點目前沒有地圖座標，要直接打開 Google Map 嗎？');
    if(openMap) window.open(sp.googleMapUrl,'_blank','noopener');
  }
  renderTimeline(si);
  document.querySelector(`[data-tl="${si}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function fileIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(ext==='pdf') return '📄';
  if(['jpg','jpeg','png','gif','webp','heic','heif'].includes(ext)) return '🖼️';
  return '📎';
}
function fmtSize(bytes){
  if(!bytes) return '';
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(0)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}
function getSpotById(id){

    for(let si=0;si<DAYS[di].spots.length;si++){
      if(DAYS[di].spots[si].id===id) return {di,si,sp:DAYS[di].spots[si]};
    }

  return null;
}

function toTWD(amt,cur){return cur==='KRW'?amt*S.krwRate:amt;}
function fmtAmt(amt,cur){return cur==='KRW'?`₩${Math.round(amt).toLocaleString()}`:`NT$${Math.round(amt).toLocaleString()}`;}
function fmtTWD(amt){return `NT$${Math.round(amt).toLocaleString()}`;}

function calcBalances(){
  const paid={}, net={};
  S.members.forEach(m=>{paid[m]=0; net[m]=0;});
  for(const exp of S.expenses){
    const twd=toTWD(exp.amount,exp.currency);
    const parts=Array.isArray(exp.participants)?exp.participants:[];
    const share=parts.length>0?twd/parts.length:0;
    if(!(exp.payer in paid)){paid[exp.payer]=0; net[exp.payer]=0;}
    paid[exp.payer]+=twd; net[exp.payer]+=twd;
    parts.forEach(p=>{if(!(p in net)){net[p]=0;} net[p]-=share;});
  }
  return {paid,net};
}

function calcSettle(net){
  const cred=Object.entries(net).filter(([,v])=>v>0.5).sort((a,b)=>b[1]-a[1]);
  const debt=Object.entries(net).filter(([,v])=>v<-0.5).map(([k,v])=>[k,-v]).sort((a,b)=>b[1]-a[1]);
  const ca=cred.map(([,v])=>v), da=debt.map(([,v])=>v), txns=[];
  let ci=0, di=0;
  while(ci<cred.length && di<debt.length){
    const t=Math.min(ca[ci],da[di]);
    txns.push({from:debt[di][0],to:cred[ci][0],amount:Math.round(t)});
    ca[ci]-=t; da[di]-=t;
    if(ca[ci]<0.5)ci++; if(da[di]<0.5)di++;
  }
  return txns;
}

function expEmoji(name){
  const n=(name||'').toLowerCase();
  if(/餐|飯|吃|食|lunch|dinner|breakfast|拉麵|鍋|肉|魚|蟹|雞|豬|牛/.test(n))return'🍽️';
  if(/咖啡|cafe|coffee|拿鐵|茶/.test(n))return'☕';
  if(/計程|taxi|uber|巴士|地鐵|metro|交通|機場|火車|列車/.test(n))return'🚕';
  if(/住|飯店|hotel|民宿/.test(n))return'🏨';
  if(/購|買|shop|百貨|藥妝|olive/.test(n))return'🛍️';
  if(/票|門票|入場|纜車|luge|spa|汗蒸/.test(n))return'🎟️';
  if(/酒|beer|飲料|drink/.test(n))return'🍺';
  return'💸';
}

function renderTodoList(){
  const el = document.getElementById('todoList');
  const stat = document.getElementById('todoStat');
  if(!S.todoItems.length){
    if(stat) stat.textContent = '';
    el.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:10px">✅</div>
      <div style="font-size:14px;font-weight:600">還沒有待辦事項</div>
      <div style="font-size:12px;margin-top:4px">點右下角 ＋ 新增行前準備事項</div>
    </div>`;
    return;
  }
  const pending = S.todoItems.filter(i=>!i.done);
  const done    = S.todoItems.filter(i=>i.done);
  if(stat) stat.innerHTML = `共 ${S.todoItems.length} 項・<b>${done.length} 項已完成</b>`;

  function itemHtml(item){
    const checkIcon = item.done
      ? `<svg width="11" height="11" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
      : '';
    const ownerHtml = item.owner
      ? `<span class="todo-owner">${item.owner}</span>`
      : `<span class="todo-owner" style="background:var(--card);color:var(--muted);border-color:var(--border)">大家</span>`;
    return `<div class="todo-item${item.done?' done':''}">
      <div class="todo-check${item.done?' on':''}" onclick="toggleTodoDone(${item.id})">${checkIcon}</div>
      <div class="todo-body">
        <div class="todo-task">${item.task}</div>
        ${ownerHtml}
      </div>
      <button class="todo-del" data-tid="${item.id}" title="刪除">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  }

  let html = pending.map(itemHtml).join('');
  if(done.length){
    html += `<div class="todo-section-label">已完成 ${done.length} 項</div>`;
    html += done.map(itemHtml).join('');
  }
  el.innerHTML = html;

  el.querySelectorAll('.todo-del[data-tid]').forEach(btn=>{
    btn.onclick = async(e)=>{
      e.stopPropagation();
      const id = parseInt(btn.dataset.tid);
      if(!confirm('確定刪除？')) return;
      await fetch(`/api/todos/${id}`,{method:'DELETE'});
      await loadTodo();
    };
  });
}

async function toggleTodoDone(id){
  const item = S.todoItems.find(i=>i.id===id);
  if(!item) return;
  // Optimistic update — flip immediately, sync in background
  const prev = item.done;
  item.done = prev ? 0 : 1;
  renderTodoList();
  try{
    await fetch(`/api/todos/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({done: item.done})});
  }catch(e){
    // revert on failure
    item.done = prev;
    renderTodoList();
  }
}

  document.getElementById('tdTask').value='';
  const sel = document.getElementById('tdOwner');
  sel.innerHTML = '<option value="">大家</option>';
  S.members.forEach(m=>{ sel.innerHTML+=`<option value="${m}">${m}</option>`; });
  if(S.myName) sel.value = S.myName;
  openModal('ovTodo');
  setTimeout(()=>document.getElementById('tdTask').focus(),350);
}

async function addTodoItem(){
  const task = document.getElementById('tdTask').value.trim();
  if(!task){ alert('請輸入待辦事項'); return; }
  const owner = document.getElementById('tdOwner').value;
  try{
    const r = await fetch('/api/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task,owner})});
    const res = await r.json();
    if(!res.ok) throw new Error(res.error);
    closeModal('ovTodo');
    await loadTodo();
  }catch(e){ alert('新增失敗：'+e.message); }
}

// ═══════════════════════════════════════════
//  SHOPPING LIST
// ═══════════════════════════════════════════
async function loadShop(){
  try{
    const r = await fetch('/api/shopping');
    S.shopItems = await r.json();
    renderShopList();
  }catch(e){ console.warn('shop fail',e); }
}

function renderShopList(){
  const el = document.getElementById('shopList');
  const stat = document.getElementById('shopStat');
  if(!S.shopItems.length){
    if(stat) stat.textContent = '';
    el.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:10px">🛍️</div>
      <div style="font-size:14px;font-weight:600">還沒有待買項目</div>
      <div style="font-size:12px;margin-top:4px">點右下角 ＋ 新增想買的東西</div>
    </div>`;
    return;
  }
  const bought = S.shopItems.filter(i=>i.bought).length;
  if(stat) stat.innerHTML = `共 ${S.shopItems.length} 項・<b>${bought} 項已購買</b>`;
  const sorted = [...S.shopItems].sort((a,b)=> a.bought - b.bought);
  el.innerHTML = sorted.map(item=>{
    const thumbHtml = item.photo
      ? `<img class="shop-thumb" src="/uploads/${item.photo}" onclick="window.open('/uploads/${item.photo}','_blank')" alt="">`
      : `<div class="shop-thumb-ph" onclick="shopPhotoClick(${item.id})">
           <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
         </div>`;
    const checkIcon = item.bought
      ? `<svg width="11" height="11" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
      : '';
    const ownerBadge = item.owner
      ? `<span style="display:inline-block;font-size:11px;font-weight:500;padding:1px 8px;border-radius:4px;margin-top:4px;background:#1A73E811;color:#1A73E8">${item.owner}</span>`
      : `<span style="display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;margin-top:4px;background:var(--card);color:var(--muted)">大家</span>`;
    return `<div class="shop-item${item.bought?' bought':''}">
      <div class="shop-check${item.bought?' on':''}" onclick="toggleShopBought(${item.id})">${checkIcon}</div>
      ${thumbHtml}
      <div class="shop-body">
        <div class="shop-name">${item.name}</div>
        ${item.note ? `<div class="shop-note">${item.note}</div>` : ''}
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;align-items:center">
          ${item.price ? `<span class="shop-price">${item.price}</span>` : ''}
          ${ownerBadge}
        </div>
      </div>
      <input type="file" id="shopPh-${item.id}" accept="image/*" style="display:none" onchange="uploadShopPhoto(this,${item.id})">
      <button class="shop-del" data-shopid="${item.id}" title="刪除">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>`;
  }).join('');
  el.querySelectorAll('.shop-del[data-shopid]').forEach(btn=>{
    btn.onclick = async(e)=>{
      e.stopPropagation();
      const id = parseInt(btn.dataset.shopid);
      if(!confirm('確定刪除這個項目？')) return;
      await fetch(`/api/shopping/${id}`,{method:'DELETE'});
      await loadShop();
    };
  });
}

function shopPhotoClick(id){
  document.getElementById(`shopPh-${id}`)?.click();
}

async function uploadShopPhoto(input, id){
  const file = input.files[0];
  if(!file) return;
  const fd = new FormData();
  fd.append('file', file); fd.append('ref_type','shop'); fd.append('ref_id', String(id)); fd.append('spot_id','0');
  try{
    const r = await fetch('/api/upload',{method:'POST',body:fd});
    const res = await r.json();
    if(!res.ok) throw new Error(res.error||'上傳失敗');
    await fetch(`/api/shopping/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo:res.filename})});
    await loadShop();
  }catch(e){ alert('上傳失敗：'+e.message); }
}

async function toggleShopBought(id){
  const item = S.shopItems.find(i=>i.id===id);
  if(!item) return;
  // Optimistic update — flip immediately, sync in background
  const prev = item.bought;
  item.bought = prev ? 0 : 1;
  renderShopList();
  try{
    await fetch(`/api/shopping/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({bought: item.bought})});
  }catch(e){
    item.bought = prev;
    renderShopList();
  }
}

function openAddShop(){
  document.getElementById('shName').value='';
  document.getElementById('shNote').value='';
  document.getElementById('shPrice').value='';
  document.getElementById('shPhotoInput').value='';
  document.getElementById('shPhotoPreview').style.display='none';
  document.getElementById('shPhotoPlaceholder').style.display='block';
  // 填入成員下拉
  const sel = document.getElementById('shOwner');
  sel.innerHTML = '<option value="">大家</option>';
  S.members.forEach(m=>{ sel.innerHTML+=`<option value="${m}">${m}</option>`; });
  if(S.myName) sel.value = S.myName;
  openModal('ovShop');
  setTimeout(()=>document.getElementById('shName').focus(),350);
}

function previewShopPhoto(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    document.getElementById('shPhotoImg').src = e.target.result;
    document.getElementById('shPhotoPreview').style.display='block';
    document.getElementById('shPhotoPlaceholder').style.display='none';
    document.getElementById('shPhotoArea').style.borderColor='#1A73E8';
  };
  reader.readAsDataURL(file);
}

async function addShopItem(){
  const name = document.getElementById('shName').value.trim();
  if(!name){ alert('請輸入品項名稱'); return; }
  const note  = document.getElementById('shNote').value.trim();
  const price = document.getElementById('shPrice').value.trim();
  const owner = document.getElementById('shOwner').value;
  const photoFile = document.getElementById('shPhotoInput').files[0];
  try{
    // 1. 建立項目
    const r = await fetch('/api/shopping',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,note,price,owner})});
    const res = await r.json();
    if(!res.ok) throw new Error(res.error);
    // 2. 若有選照片，上傳並更新
    if(photoFile){
      const fd = new FormData();
      fd.append('file', photoFile); fd.append('ref_type','shop'); fd.append('ref_id', String(res.id)); fd.append('spot_id','0');
      const ur = await fetch('/api/upload',{method:'POST',body:fd});
      const ures = await ur.json();
      if(ures.ok){
        await fetch(`/api/shopping/${res.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({photo:ures.filename})});
      }
    }
    closeModal('ovShop');
    await loadShop();
  }catch(e){ alert('新增失敗：'+e.message); }
}
</script>
